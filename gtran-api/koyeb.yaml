name: gtran-api
services:
  - name: api
    docker:
      dockerfile: Dockerfile
    ports:
      - port: 8000
        protocol: http
    instance_type: nano
    scaling:
      min: 1
      max: 1
    health_checks:
      - port: 8000
        http_path: /health
        initial_delay: 15
        interval: 30
        timeout: 5
        restart_limit: 3
    env:
      - key: JWT_SECRET
        secret: JWT_SECRET
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,http://localhost:5173
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        secret: SUPABASE_URL
      - key: SUPABASE_KEY
        secret: SUPABASE_KEY
