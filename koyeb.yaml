name: gtran-api
services:
  - name: api
    git:
      branch: main
    builder: docker
    docker:
      dockerfile: Dockerfile
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    instance_type: nano
    scaling:
      min: 1
      max: 1
    health_checks:
      - port: 8000
        http_path: /health
        initial_delay: 20
        interval: 30
        timeout: 5
        restart_limit: 3
    env:
      - key: JWT_SECRET
        secret: jwt-secret
      - key: ALLOWED_ORIGINS
        value: https://djassa-transport.vercel.app,http://localhost:5173
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: ENVIRONMENT
        value: production
      - key: STORE_PATH
        value: data/store.json
